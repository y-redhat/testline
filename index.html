<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>APIログ監視</title>
    <style>
        body { background: #1e1e1e; color: #d4d4d4; font-family: monospace; padding: 20px; }
        #log-container { border: 1px solid #444; height: 400px; overflow-y: auto; padding: 10px; background: #000; }
        .log-item { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .time { color: #569cd6; margin-right: 10px; }
        .error { color: #f44747; }
        .success { color: #b5cea8; }
    </style>
</head>
<body>
    <h3>API 実行ログ (20秒間隔)</h3>
    <div id="log-container"></div>

    <script>
        const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
        const apiUrl = 'https://onrender.com';
        const logContainer = document.getElementById('log-container');

        // 画面にログを出力する関数
        function addLog(message, isError = false) {
            const div = document.createElement('div');
            div.className = `log-item ${isError ? 'error' : 'success'}`;
            const now = new Date().toLocaleTimeString();
            div.innerHTML = `<span class="time">[${now}]</span> ${message}`;
            logContainer.prepend(div); // 新しいログを上に表示
        }

        async function getData() {
            while (true) {
                try {
                    const response = await fetch(apiUrl);
                    if (!response.ok) throw new Error(`HTTPエラー: ${response.status}`);
                    
                    const data = await response.json();
                    addLog(`成功: ${JSON.stringify(data).substring(0, 50)}...`);
                    
                    await wait(20000);
                } catch (error) {
                    addLog(`エラー: ${error.message}`, true);
                    await wait(20000);
                }
            }
        }

        // 実行開始
        addLog("監視を開始しました...");
        getData();
    </script>
</body>
</html>
